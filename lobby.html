<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Royale Arena — Lobby</title>
  <style>
    /* ============================================================
       VARIABLES & RESET
    ============================================================ */
    :root {
      --bg:          #0f0f1a;
      --bg-panel:    #13131f;
      --bg-card:     #1a1a2e;
      --bg-input:    #1e1e30;
      --accent:      #7b5ea7;
      --accent-hover:#a07fd4;
      --text:        #e8e8f0;
      --text-muted:  #6b6b8a;
      --border:      #2a2a45;
      --success:     #4caf7d;
      --danger:      #e05c5c;
      --log-color:   #7b9ea7;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ============================================================
       ÉCRAN DE CONNEXION
    ============================================================ */
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 24px;
    }

    #login-screen h1 {
      font-size: 2rem;
      color: var(--accent-hover);
      letter-spacing: 3px;
    }

    .box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 340px;
    }

    .box label { font-size: 0.9rem; color: var(--text-muted); }

    .box input {
      padding: 10px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 1rem;
      outline: none;
    }

    .box input:focus { border-color: var(--accent); }

    .box button {
      padding: 10px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.2s;
    }

    .box button:hover { background: var(--accent-hover); }

    #login-error { color: var(--danger); font-size: 0.82rem; min-height: 16px; }

    /* ============================================================
       LOBBY PRINCIPAL
    ============================================================ */
    #lobby {
      display: none;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    #lobby header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #lobby header h1 { color: var(--accent); font-size: 1.4rem; letter-spacing: 2px; }

    .user-info {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.9rem;
    }

    .user-info span { color: var(--text-muted); }
    .user-info b    { color: var(--text); }

    .user-info button {
      background: var(--success);
      color: #000;
      border: none;
      padding: 6px 12px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 700;
      transition: opacity 0.2s;
    }

    .user-info button:hover { opacity: 0.85; }

    /* ── 3 colonnes ── */
    .lobby-layout {
      display: grid;
      grid-template-columns: 260px 1fr 220px;
      flex: 1;
      overflow: hidden;
    }

    /* ============================================================
       COLONNE GAUCHE
    ============================================================ */
    .col-left {
      background: var(--bg-panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 12px;
      overflow-y: auto;
    }

    .btn-main {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 700;
      transition: all 0.2s;
    }

    .btn-create { background: var(--accent); color: white; }
    .btn-create:hover { background: var(--accent-hover); }

    .btn-join {
      background: none;
      border: 2px solid var(--accent) !important;
      color: var(--accent-hover);
    }

    .btn-join:hover { background: #1e1e40; }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
    }

    .section-title {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Cartes de parties */
    .partie-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.82rem;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .partie-card b { color: var(--accent-hover); }

    .partie-card button {
      margin-top: 4px;
      padding: 5px 10px;
      background: var(--accent);
      border: none;
      border-radius: 6px;
      color: white;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
      align-self: flex-start;
    }

    .partie-card button:hover { background: var(--accent-hover); }

    /* ============================================================
       COLONNE CENTRE
    ============================================================ */
    .col-center {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .chat-topbar h2 { font-size: 1rem; color: var(--accent-hover); }

    .btn-players {
      display: flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 6px 12px;
      cursor: pointer;
      font-size: 0.82rem;
      transition: all 0.2s;
    }

    .btn-players:hover { border-color: var(--accent); color: var(--accent-hover); }

    .online-dot {
      width: 8px; height: 8px;
      background: var(--success);
      border-radius: 50%;
      display: inline-block;
    }

    /* Panneau joueurs dépliable */
    .players-panel {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.35s ease, padding 0.35s ease;
      padding: 0 16px;
    }

    .players-panel.open { max-height: 200px; padding: 12px 16px; }

    .players-grid { display: flex; flex-wrap: wrap; gap: 8px; }

    /* ── Tag joueur ── */
    .player-tag {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.8rem;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Messages */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .chat-messages::-webkit-scrollbar { width: 6px; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .msg {
      font-size: 0.88rem;
      line-height: 1.5;
      padding: 4px 0;
    }

    .msg-author { color: var(--accent-hover); font-weight: 700; margin-right: 6px; }
    .msg-time   { color: var(--text-muted); font-size: 0.75rem; margin-left: 8px; }

    .msg-log {
      font-size: 0.82rem;
      color: var(--log-color);
      font-style: italic;
      font-weight: 700;
    }

    /* Zone de saisie */
    .chat-input-zone {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .chat-input-zone input {
      flex: 1;
      padding: 10px 14px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .chat-input-zone input:focus { border-color: var(--accent); }

    .btn-send {
      padding: 10px 18px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.2s;
    }

    .btn-send:hover { background: var(--accent-hover); }

    /* ============================================================
       COLONNE DROITE
    ============================================================ */
    .col-right {
      background: var(--bg-panel);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 12px;
    }

    .btn-tab {
      width: 100%;
      padding: 12px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s;
    }

    .btn-tab:hover { border-color: var(--accent); color: var(--accent-hover); }
    .btn-tab.active { border-color: var(--accent); background: #1e1e40; color: var(--accent-hover); }

    /* ============================================================
       PANNEAU LATÉRAL DROIT
    ============================================================ */
    .right-panel {
      position: fixed;
      top: 0; right: 0;
      width: 480px;
      height: 100vh;
      background: var(--bg-panel);
      border-left: 2px solid var(--accent);
      z-index: 100;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.3s ease;
    }

    .right-panel.open { transform: translateX(0); }

    .right-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .right-panel-header h3 { font-size: 1rem; color: var(--accent-hover); }

    .btn-close {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1.2rem;
      cursor: pointer;
      transition: color 0.2s;
    }

    .btn-close:hover { color: var(--danger); }

    .right-panel-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    /* ============================================================
       MODALS
    ============================================================ */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
      width: 360px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .modal h3 { color: var(--accent-hover); font-size: 1.1rem; }
    .modal p  { color: var(--text-muted); font-size: 0.88rem; }

    .modal input {
      padding: 10px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 1rem;
      outline: none;
      width: 100%;
    }

    .modal input:focus { border-color: var(--accent); }

    .code-display {
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: 8px;
      color: var(--accent-hover);
      text-align: center;
      padding: 12px;
      background: var(--bg-card);
      border-radius: 8px;
      display: none;
    }

    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; }

    .btn-cancel {
      padding: 8px 16px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }

    .btn-cancel:hover { border-color: var(--danger); color: var(--danger); }

    .btn-confirm {
      padding: 8px 16px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.2s;
    }

    .btn-confirm:hover { background: var(--accent-hover); }
  </style>
</head>
<body>

  <!-- ============================================================
       ÉCRAN DE CONNEXION
  ============================================================ -->
  <div id="login-screen">
    <h1>🎴 Royale Arena</h1>
    <div class="box">
      <label for="pseudo-input">Choisis ton pseudo :</label>
      <input type="text" id="pseudo-input" maxlength="20" placeholder="Ex: Mario64" />
      <button id="login-btn">Entrer dans le lobby</button>
      <div id="login-error"></div>
    </div>
  </div>

  <!-- ============================================================
       LOBBY PRINCIPAL
  ============================================================ -->
  <div id="lobby">

    <!-- Header -->
    <header>
      <h1>⚔️ Royale Arena</h1>
      <div class="user-info">
        <span>Connecté en tant que <b id="current-pseudo"></b></span>
        <button id="change-pseudo-btn">✏️ Changer</button>
      </div>
    </header>

    <!-- 3 colonnes -->
    <div class="lobby-layout">

      <!-- ================== GAUCHE ================== -->
      <aside class="col-left">
        <button class="btn-main btn-create" onclick="ouvrirModalCreer()">＋ Créer une partie</button>
        <button class="btn-main btn-join"   onclick="ouvrirModalRejoindre()">→ Rejoindre une partie</button>
        <hr class="divider"/>
        <div class="section-title">🎮 Parties en cours</div>
        <div class="parties-list" id="parties-list">
          <div style="color:var(--text-muted); font-size:0.8rem;">Aucune partie en cours...</div>
        </div>
      </aside>

      <!-- ================== CENTRE ================== -->
      <main class="col-center">

        <div class="chat-topbar">
          <h2>💬 Chat Global</h2>
          <button class="btn-players" onclick="toggleJoueurs()">
            <span class="online-dot"></span>
            <span id="btn-players-label">Joueurs connectés</span>
          </button>
        </div>

        <!-- Panneau joueurs dépliable -->
        <div class="players-panel" id="players-panel">
          <div class="players-grid" id="players-grid"></div>
        </div>

        <div class="chat-messages" id="chat-messages"></div>

        <div class="chat-input-zone">
          <input
            type="text"
            id="chat-input"
            placeholder="Écris un message..."
            maxlength="300"
            onkeydown="if(event.key==='Enter') envoyerMessage()"
          />
          <button class="btn-send" onclick="envoyerMessage()">Envoyer</button>
        </div>

      </main>

      <!-- ================== DROITE ================== -->
      <aside class="col-right">
        <div class="section-title">Ressources</div>
        <button class="btn-tab" id="btn-regles"  onclick="ouvrirPanel('regles')">📖 Règles du jeu</button>
        <button class="btn-tab" id="btn-galerie" onclick="ouvrirPanel('galerie')">🎴 Galerie des cartes</button>
      </aside>

    </div>
  </div>

  <!-- ============================================================
       PANNEAU LATÉRAL DROIT
  ============================================================ -->
  <div class="right-panel" id="right-panel">
    <div class="right-panel-header">
      <h3 id="right-panel-title">Panneau</h3>
      <button class="btn-close" onclick="fermerPanel()">✕</button>
    </div>
    <div class="right-panel-content" id="right-panel-content"></div>
  </div>

  <!-- ============================================================
       MODAL — CRÉER UNE PARTIE
  ============================================================ -->
  <div class="modal-overlay" id="modal-creer">
    <div class="modal">
      <h3>＋ Créer une partie</h3>
      <p>Un code unique sera généré. Partagez-le à votre adversaire !</p>
      <div class="code-display" id="code-display">——</div>
      <div class="modal-actions">
        <button class="btn-cancel"  onclick="fermerModal('modal-creer')">Fermer</button>
        <button class="btn-confirm" id="btn-creer-confirm" onclick="creerPartie()">Créer</button>
      </div>
    </div>
  </div>

  <!-- ============================================================
       MODAL — REJOINDRE UNE PARTIE
  ============================================================ -->
  <div class="modal-overlay" id="modal-rejoindre">
    <div class="modal">
      <h3>→ Rejoindre une partie</h3>
      <p>Entre le code de la partie que tu veux rejoindre.</p>
      <input
        type="text"
        id="input-code-rejoindre"
        placeholder="Ex : AB12CD"
        maxlength="6"
        style="text-transform:uppercase; letter-spacing:3px; font-size:1.1rem; text-align:center;"
      />
      <div class="modal-actions">
        <button class="btn-cancel"  onclick="fermerModal('modal-rejoindre')">Annuler</button>
        <button class="btn-confirm" onclick="rejoindrePartie()">Rejoindre</button>
      </div>
    </div>
  </div>

  <!-- ============================================================
       SCRIPT PRINCIPAL
  ============================================================ -->
  <script type="module">

    // ── Imports Firebase ──
    import { db, app } from './firebase-config.js';
    import {
      getAuth, signInAnonymously, onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
    // ✅ Dans le bloc import en haut du script
import {
  collection, doc, setDoc, getDoc, addDoc, onSnapshot,
  serverTimestamp, query, orderBy, limit,
  deleteDoc, updateDoc, getDocs, where  // ← ajoute ces 2
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";


    const auth = getAuth(app);

    // ── Références DOM ──
    const loginScreen     = document.getElementById('login-screen');
    const lobbyEl         = document.getElementById('lobby');
    const pseudoInput     = document.getElementById('pseudo-input');
    const loginBtn        = document.getElementById('login-btn');
    const loginError      = document.getElementById('login-error');
    const currentPseudoEl = document.getElementById('current-pseudo');
    const changePseudoBtn = document.getElementById('change-pseudo-btn');

    // ── Variables globales ──
    let currentUserId   = null;
    let currentPseudo   = null;
    let panelOuvert     = null;   // 'regles' | 'galerie' | null
    let presenceDocRef  = null;   // Référence doc présence du joueur
    let unsubChat       = null;   // Unsub listener chat
    let unsubPresence   = null;   // Unsub listener présence
    let unsubParties    = null;   // Unsub listener parties

    // ── Cache des panneaux chargés ──
    const panneauCache = {};

    const panneauTitres = {
      regles:  '📖 Règles du jeu',
      galerie: '🎴 Galerie des cartes'
    };

    const panneauFichiers = {
      regles:  'regles.html',
      galerie: 'galerie.html'
    };

    // ==========================================================
    // AUTH ANONYME FIREBASE
    // ==========================================================
    signInAnonymously(auth).catch((err) => {
      loginError.textContent = "Erreur de connexion : " + err.message;
      console.error(err);
    });

    // Écoute le changement d'état d'auth
    onAuthStateChanged(auth, async (user) => {
      if (!user) return;
      currentUserId = user.uid;

      const userDocRef = doc(db, "users", currentUserId);
      const userSnap   = await getDoc(userDocRef);

      // Si le joueur a déjà un pseudo sauvegardé → on le reconnecte direct
      if (userSnap.exists() && userSnap.data().pseudo) {
        const pseudo = userSnap.data().pseudo;
        entrerDansLobby(pseudo);
      }
    });

    // ==========================================================
    // VALIDATION PSEUDO
    // ==========================================================
    loginBtn.addEventListener('click', async () => {
      const pseudo = pseudoInput.value.trim();

      // Vérifie longueur et caractères autorisés (lettres, chiffres, _, -)
      if (pseudo.length < 2 || pseudo.length > 20) {
        loginError.textContent = "Pseudo : 2 à 20 caractères.";
        return;
      }

      if (!/^[a-zA-Z0-9_\-]+$/.test(pseudo)) {
        loginError.textContent = "Caractères autorisés : lettres, chiffres, _ et -";
        return;
      }

      loginError.textContent = '';

      try {
        // Sauvegarde le pseudo dans Firestore
        await setDoc(doc(db, "users", currentUserId), { pseudo }, { merge: true });
        localStorage.setItem('tcg_pseudo', pseudo);
        entrerDansLobby(pseudo);
      } catch (err) {
        loginError.textContent = "Erreur : " + err.message;
        console.error(err);
      }
    });

    // ==========================================================
    // ENTRÉE DANS LE LOBBY
    // ==========================================================
    function entrerDansLobby(pseudo) {
      currentPseudo               = pseudo;
      loginScreen.style.display   = 'none';
      lobbyEl.style.display       = 'flex';
      currentPseudoEl.textContent = pseudo;

      // Lance tous les listeners temps réel
      enregistrerPresence();
      ecouterPresence();
      ecouterChat();
      ecouterParties();
    }

    // ==========================================================
    // CHANGER DE PSEUDO
    // ==========================================================
    changePseudoBtn.addEventListener('click', () => {
      // Retire la présence avant de retourner à l'écran de connexion
      if (presenceDocRef) deleteDoc(presenceDocRef);

      // Arrête les listeners
      if (unsubChat)     unsubChat();
      if (unsubPresence) unsubPresence();
      if (unsubParties)  unsubParties();

      pseudoInput.value         = currentPseudoEl.textContent;
      loginError.textContent    = '';
      lobbyEl.style.display     = 'none';
      loginScreen.style.display = 'flex';
      pseudoInput.focus();
    });

    // ==========================================================
    // PRÉSENCE — Enregistre le joueur comme "en ligne"
    // ==========================================================
    async function enregistrerPresence() {
      // Doc dans la collection "presence" avec l'UID du joueur
      presenceDocRef = doc(db, "presence", currentUserId);

      await setDoc(presenceDocRef, {
        pseudo:    currentPseudo,
        entreeAt:  serverTimestamp()
      });

      // Supprime le doc quand la fenêtre est fermée / rechargée
      window.addEventListener('beforeunload', () => {
        // deleteDoc est async mais on fait de notre mieux
        navigator.sendBeacon; // fallback navigateur
        deleteDoc(presenceDocRef);
      });
    }

    // ==========================================================
    // PRÉSENCE — Écoute les joueurs en ligne en temps réel
    // ==========================================================
    function ecouterPresence() {
      const presenceCol = collection(db, "presence");

      unsubPresence = onSnapshot(presenceCol, (snap) => {
        const grid  = document.getElementById('players-grid');
        const label = document.getElementById('btn-players-label');

        // Vide la grille
        grid.innerHTML = '';

        snap.forEach((d) => {
          const data = d.data();

          // Crée un tag par joueur
          const tag = document.createElement('div');
          tag.className = 'player-tag';
          // Dot vert + pseudo
          tag.innerHTML = `<span class="online-dot"></span>${data.pseudo}`;
          grid.appendChild(tag);
        });

        // Met à jour le compteur dans le bouton
        label.textContent = `${snap.size} joueur${snap.size > 1 ? 's' : ''} connecté${snap.size > 1 ? 's' : ''}`;
      });
    }

    // ==========================================================
    // CHAT — Écoute les messages en temps réel (50 derniers)
    // ==========================================================
    function ecouterChat() {
      const chatCol = collection(db, "chat");
      const q       = query(chatCol, orderBy("at"), limit(50));

      unsubChat = onSnapshot(q, (snap) => {
        snap.docChanges().forEach((change) => {
          // On n'ajoute que les nouveaux messages (pas les modifs/suppressions)
          if (change.type === 'added') {
            const data = change.doc.data();
            ajouterMessageDom(data);
          }
        });
      });
    }

    // ==========================================================
    // CHAT — Envoyer un message
    // ==========================================================
    async function envoyerMessage() {
      const input = document.getElementById('chat-input');
      const texte = input.value.trim();
      if (!texte || !currentPseudo) return;

      input.value = '';

      try {
        // Ajoute le message dans Firestore
        await addDoc(collection(db, "chat"), {
          auteur: currentPseudo,
          texte,
          type:   'msg',
          at:     serverTimestamp()
        });
      } catch (err) {
        console.error("Erreur envoi message :", err);
      }
    }

    // ==========================================================
    // CHAT — Affichage d'un message dans le DOM
    // ==========================================================
    function ajouterMessageDom(data) {
      const zone = document.getElementById('chat-messages');
      const el   = document.createElement('div');

      if (data.type === 'log') {
        // Message système (italique)
        el.className   = 'msg msg-log';
        el.textContent = data.texte;
      } else {
        // Message joueur avec heure
        el.className = 'msg';

        // Heure locale à partir du timestamp Firestore
        let heure = '';
        if (data.at) {
          const d = data.at.toDate();
          heure   = `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
        }

        el.innerHTML =
          `<span class="msg-author">${data.auteur}</span>` +
          `${data.texte}` +
          `<span class="msg-time">${heure}</span>`;
      }

      zone.appendChild(el);
      // Scroll automatique vers le bas
      zone.scrollTop = zone.scrollHeight;
    }

// ==========================================================
// PARTIES — Écoute les parties ouvertes en temps réel
// ==========================================================
function ecouterParties() {
  const partiesCol = collection(db, "parties");

  unsubParties = onSnapshot(partiesCol, (snap) => {
    const liste = document.getElementById('parties-list');
    liste.innerHTML = '';

    if (snap.empty) {
      liste.innerHTML = '<div style="color:var(--text-muted); font-size:0.8rem;">Aucune partie en cours...</div>';
      return;
    }

    // Construit les cartes UI pour chaque partie
    snap.forEach((d) => {
      const data = d.data();
      const card = document.createElement('div');
      card.className = 'partie-card';

      card.innerHTML =
        `<b>Code : ${data.code}</b>` +
        `<span>Créée par : ${data.createur}</span>` +
        `<span>Statut : ${data.statut === 'attente' ? '⏳ En attente' : '⚔️ En cours'}</span>`;

      // Bouton rejoindre uniquement si la partie attend un joueur
      // et que ce n'est pas notre propre partie
      if (data.statut === 'attente' && data.createurId !== currentUserId) {
        const btn = document.createElement('button');
        btn.textContent = 'Rejoindre';
        btn.onclick     = () => rejoindrePartieParId(d.id, data.code);
        card.appendChild(btn);
      }

      liste.appendChild(card);
    });

    // ==========================================================
    // REDIRECTION J1 — Si notre partie passe en 'en_cours'
    // ==========================================================
    snap.forEach((d) => {
      const data = d.data();

      // Debug
      console.log("createurId:", data.createurId, "| currentUserId:", currentUserId, "| statut:", data.statut);

      // Si c'est notre partie ET qu'elle vient de passer en cours
      if (data.createurId === currentUserId && data.statut === 'en_cours') {
        window.location.href = `game.html?partie=${d.id}&joueur=j1`;
      }
    });

  }); // fin onSnapshot
}


    // ==========================================================
    // CRÉER UNE PARTIE — Firebase
    // ==========================================================
    window.creerPartie = async function() {
      // Génère un code sans ambiguïtés O/0 I/1
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      let code = '';
      for (let i = 0; i < 6; i++) {
        code += chars[Math.floor(Math.random() * chars.length)];
      }

      const codeDisplay = document.getElementById('code-display');
      codeDisplay.textContent   = code;
      codeDisplay.style.display = 'block';

      const btn = document.getElementById('btn-creer-confirm');
      btn.textContent = '⏳ En attente...';
      btn.disabled    = true;

      try {
        // Crée le document de partie dans Firestore
        await addDoc(collection(db, "parties"), {
          code,
          createur:   currentPseudo,
          createurId: currentUserId,
          statut:     'attente',     // 'attente' | 'en_cours' | 'terminee'
          creedAt:    serverTimestamp()
        });

        // Log dans le chat
        await addDoc(collection(db, "chat"), {
          texte: `⚔️ ${currentPseudo} a créé une partie. [Code : ${code}]`,
          type:  'log',
          at:    serverTimestamp()
        });

      } catch (err) {
        console.error("Erreur création partie :", err);
      }
    };

    // ==========================================================
    // REJOINDRE UNE PARTIE — via saisie de code
    // ==========================================================
    window.rejoindrePartie = async function() {
      const code = document.getElementById('input-code-rejoindre').value.trim().toUpperCase();

      if (code.length < 6) {
        alert('Le code doit faire 6 caractères !');
        return;
      }

      // Cherche la partie correspondante dans le snapshot actuel
      // (on écoute déjà les parties, donc on peut itérer le DOM
      //  mais mieux vaut requêter Firestore directement)

      try {
        const partiesCol = collection(db, "parties");
        const q          = query(partiesCol, where("code", "==", code), where("statut", "==", "attente"));
        const snap       = await getDocs(q);

        if (snap.empty) {
          alert("Aucune partie en attente avec ce code.");
          return;
        }

        const partieDoc = snap.docs[0];
        await rejoindrePartieParId(partieDoc.id, code);

      } catch (err) {
        console.error("Erreur rejoindre partie :", err);
      }
    };

   // ==========================================================
// REJOINDRE UNE PARTIE — via ID Firestore (bouton carte)
// ==========================================================
async function rejoindrePartieParId(partieId, code) {
  try {
    // Met à jour le statut de la partie
    await updateDoc(doc(db, "parties", partieId), {
      adversaire:   currentPseudo,
      adversaireId: currentUserId,
      statut:       'en_cours'
    });

    // Log dans le chat
    await addDoc(collection(db, "chat"), {
      texte: `🚪 ${currentPseudo} a rejoint la partie [${code}].`,
      type:  'log',
      at:    serverTimestamp()
    });

    fermerModal('modal-rejoindre');

    // Redirige J2 vers la page de jeu
    console.log("✅ Redirection J2 vers game.html");
    window.location.href = `game.html?partie=${partieId}&joueur=j2`;

  } catch (err) {
    console.error("Erreur rejoindre partie par ID :", err);
    alert("Erreur : " + err.message);
  }
}

    // JOUEURS CONNECTÉS — Toggle panneau dépliable

    window.toggleJoueurs = function() {
      document.getElementById('players-panel').classList.toggle('open');

    // ==========================================================
    // PANNEAU LATÉRAL DROIT — Chargement dynamique via fetch()
    // ==========================================================
    window.ouvrirPanel = async function(nom) {

      // Re-clic sur le même onglet → ferme
      if (panelOuvert === nom) {
        fermerPanel();
        return;
      }

      // Boutons onglets
      document.getElementById('btn-regles').classList.remove('active');
      document.getElementById('btn-galerie').classList.remove('active');
      document.getElementById(`btn-${nom}`).classList.add('active');

      // Ouvre le panneau
      const panel  = document.getElementById('right-panel');
      const titre  = document.getElementById('right-panel-title');
      const contenu = document.getElementById('right-panel-content');

      titre.textContent = panneauTitres[nom];
      panel.classList.add('open');
      panelOuvert = nom;

      // Charge le fichier externe si pas encore en cache
      if (!panneauCache[nom]) {
        contenu.innerHTML = '<div style="padding:20px;color:var(--text-muted);">Chargement...</div>';

        try {
          const reponse = await fetch(panneauFichiers[nom]);
          if (!reponse.ok) throw new Error(`Fichier introuvable (${reponse.status})`);

          const html   = await reponse.text();
          const parser = new DOMParser();
          const docExt = parser.parseFromString(html, 'text/html');

          // Injecte les styles du fichier externe (une seule fois)
          docExt.querySelectorAll('style').forEach(styleEl => {
            if (!document.querySelector(`style[data-panneau="${nom}"]`)) {
              const clone = document.createElement('style');
              clone.setAttribute('data-panneau', nom);
              clone.textContent = styleEl.textContent;
              document.head.appendChild(clone);
            }
          });

          // Met en cache et injecte le HTML
          panneauCache[nom] = docExt.body.innerHTML;

        } catch (err) {
          contenu.innerHTML = `<div style="padding:20px;color:var(--danger);">Erreur : ${err.message}</div>`;
          return;
        }
      }

      // Injecte le contenu (depuis cache ou fraîchement chargé)
      contenu.innerHTML = panneauCache[nom];

      // Initialise la galerie si nécessaire (APRÈS injection dans le DOM)
      if (nom === 'galerie') {
        try {
          const { initGalerie } = await import('./galerie.js');
          initGalerie();
        } catch (err) {
          console.error("Erreur init galerie :", err);
        }
      }
    };

    // Ferme le panneau latéral
    window.fermerPanel = function() {
      document.getElementById('right-panel').classList.remove('open');
      document.getElementById('btn-regles').classList.remove('active');
      document.getElementById('btn-galerie').classList.remove('active');
      panelOuvert = null;
    };

    // ==========================================================
    // MODALS — Ouvrir / Fermer
    // ==========================================================
    window.ouvrirModalCreer = function() {
      // Remet la modal dans son état initial à chaque ouverture
      const codeDisplay = document.getElementById('code-display');
      codeDisplay.style.display = 'none';
      codeDisplay.textContent   = '——';

      const btn = document.getElementById('btn-creer-confirm');
      btn.textContent = 'Créer';
      btn.disabled    = false;

      document.getElementById('modal-creer').classList.add('open');
    };

    window.ouvrirModalRejoindre = function() {
      document.getElementById('input-code-rejoindre').value = '';
      document.getElementById('modal-rejoindre').classList.add('open');
    };

    window.fermerModal = function(id) {
      document.getElementById(id).classList.remove('open');
    };

    // Expose les fonctions au HTML (nécessaire car module ES6)
    window.envoyerMessage = envoyerMessage;

  </script>
